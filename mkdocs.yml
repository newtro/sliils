site_name: SliilS
site_description: Self-hosted Slack/Teams alternative — documentation
site_url: https://docs.sliils.com
repo_url: https://github.com/newtro/sliils
repo_name: newtro/sliils
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Self-hosting:
      - Local development: self-hosting/local-dev.md
      - Production deploy: self-hosting/production.md
      - Security checklist: self-hosting/security-checklist.md
  - Apps platform:
      - Overview: apps/overview.md
      - Quickstart: apps/quickstart.md
      - OAuth + install: apps/oauth.md
      - Bot API reference: apps/bot-api.md
      - Webhooks: apps/webhooks.md
      - Slash commands: apps/slash-commands.md
      - Block-Kit: apps/block-kit.md
  - Admin guide:
      - Members + roles: admin/members.md
      - Retention + audit: admin/retention.md
      - Data export: admin/export.md
  - Reference:
      - API reference: reference/api.md
      - WebSocket protocol: reference/ws.md
      - Database schema: reference/schema.md
