name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  js:
    name: JS / TS (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sliils_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sliils_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SLIILS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sliils_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/server/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: apps/server
          args: --timeout=5m

      - name: Install citext extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d sliils_test -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 ./...

      - name: Build
        run: go build -o bin/sliils-app ./cmd/sliils-app

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: apps/server/coverage.out
          retention-days: 7

  docker:
    name: Docker build (sliils-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          file: apps/server/Dockerfile
          push: false
          load: true
          tags: sliils/app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci-${{ github.sha }}
