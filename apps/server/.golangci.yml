version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - gocritic
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - rowserrcheck
    - nolintlint
    - prealloc
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
        - name: unused-parameter
          disabled: true
    gosec:
      excludes:
        - G104
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sliils/sliils

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
